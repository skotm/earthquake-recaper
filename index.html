<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報可視化ツール - NERV List & HIG Map (Tsunami Info & Transparent Panel)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Base Variables */
        :root {
            --bg-color: #000000;
            --surface-color: rgba(28, 28, 30, 0.75);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(235, 235, 245, 0.6);
            --border-color: rgba(84, 84, 88, 0.5);
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }

        body { 
            margin: 0; padding: 0; display: flex; height: 100vh; 
            background-color: var(--bg-color); color: var(--text-primary); 
            font-family: var(--font-family); overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* -------------------------------------
           サイドバー
           ------------------------------------- */
        #sidebar {
            width: 320px; min-width: 320px;
            background: var(--surface-color);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            z-index: 1000; box-shadow: 2px 0 20px rgba(0,0,0,0.8);
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            font-weight: 700; font-size: 18px; letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            text-align: center; color: #ddd;
        }

        #list-container { flex-grow: 1; overflow-y: auto; padding: 8px; scroll-behavior: smooth; }
        #list-container::-webkit-scrollbar { width: 0px; }

        .list-item {
            padding: 12px; margin-bottom: 4px;
            border-radius: 8px; cursor: pointer;
            border-left: 4px solid transparent; 
            background: rgba(255,255,255,0.02);
            transition: background-color 0.2s, transform 0.1s;
        }
        .list-item:hover { background-color: rgba(255, 255, 255, 0.08); }
        .list-item.active { background-color: rgba(255, 255, 255, 0.15); }
        
        .list-item-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between;}
        .list-item-details { font-size: 12px; color: var(--text-secondary); }

        /* -------------------------------------
           メインマップ＆凡例
           ------------------------------------- */
        #map-container { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 100%; background-color: #0c0c0e; }

        .legend {
            background: var(--surface-color); backdrop-filter: blur(20px);
            padding: 12px 16px; border-radius: 14px; border: 0.5px solid var(--border-color);
            line-height: 1.8; color: var(--text-primary); font-size: 13px;
        }
        .legend strong { display: block; margin-bottom: 6px; font-size: 14px; }
        .legend i { width: 14px; height: 14px; float: left; margin-top: 4px; margin-right: 10px; border-radius: 50%; }

        /* -------------------------------------
           詳細パネル (HIG風オーバーレイ + コメント・リスト)
           ------------------------------------- */
        #detail-panel {
            position: absolute; bottom: -600px; left: 20px; 
            width: 380px; 
            /* ★改善: 背景の透過度を上げて透け感を強める (0.85 -> 0.65) */
            background: rgba(28, 28, 30, 0.65);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 0.5px solid var(--border-color); border-radius: 20px;
            padding: 20px 20px 10px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 1000; transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            display: flex; flex-direction: column;
        }
        #detail-panel.show { bottom: 30px; pointer-events: auto; }
        
        .dp-close {
            position: absolute; top: 12px; right: 16px; width: 24px; height: 24px;
            background: rgba(255,255,255,0.1); border-radius: 50%; text-align: center;
            line-height: 24px; font-size: 12px; cursor: pointer; color: #fff;
            z-index: 10;
        }
        .dp-close:hover { background: rgba(255,255,255,0.2); }

        .dp-main { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
        .dp-scale-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 16px; padding: 12px; min-width: 80px;
            background: rgba(0,0,0,0.3); border: 2px solid transparent;
        }
        .dp-scale-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
        .dp-scale-value { font-size: 38px; font-weight: 700; line-height: 1; }
        
        .dp-info { flex-grow: 1; display: flex; flex-direction: column; }
        .dp-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .dp-time { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .dp-meta { font-size: 14px; }
        .dp-meta strong { font-size: 18px; color: #fff; }

        /* 折りたたみトグルボタン */
        .dp-toggle-btn {
            margin-top: 15px; padding: 10px 0 5px 0; text-align: center;
            font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer;
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: color 0.2s;
        }
        .dp-toggle-btn:hover { color: #fff; }

        /* ★追加: 展開されるエリア全体（コメント＋リスト） */
        .dp-extended-area {
            overflow-y: auto; padding-right: 4px;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.4s ease;
            max-height: 350px; opacity: 1; margin-top: 10px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .dp-extended-area.collapsed {
            max-height: 0; opacity: 0; margin-top: 0; overflow: hidden; padding-top: 0; padding-bottom: 0;
        }
        .dp-extended-area::-webkit-scrollbar { width: 4px; }
        .dp-extended-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* ★追加: コメントボックス（津波情報など） */
        .dp-comments-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.5;
            color: #e5e5ea;
            border-left: 4px solid #FFD60A; /* 目立つように黄色のアクセント */
        }

        /* 観測点リスト */
        .dp-stations-container { display: flex; flex-direction: column; }
        .dp-station-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .dp-station-item:last-child { border-bottom: none; }
        .dp-station-name { font-size: 14px; color: #e5e5ea; }
        .dp-station-scale {
            font-size: 13px; font-weight: 700; color: #fff;
            padding: 2px 10px; border-radius: 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* -------------------------------------
           マーカーデザイン
           ------------------------------------- */
        .epicenter-cross {
            color: #ff3b30; font-size: 24px; font-weight: bold; line-height: 24px;
            text-align: center; text-shadow: 0 0 5px #000;
            position: absolute; top: -12px; left: -12px; width: 24px; height: 24px;
        }

        .custom-div-icon { overflow: visible; }
        
        .station-dot {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%; border: 1.5px solid #ffffff;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6);
            width: 14px; height: 14px;
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .station-scale-text {
            display: none; color: #ffffff; 
            font-family: var(--font-family); font-weight: 800; font-size: 12px; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.6); 
            letter-spacing: -0.5px; line-height: 1; transform: translateY(0.5px); 
        }

        .map-zoomed .station-dot { width: 24px; height: 24px; border-width: 1.5px; }
        .map-zoomed .station-scale-text { display: block; }

    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">地震発生履歴</div>
    <div id="list-container"></div>
</div>

<div id="map-container">
    <div id="map"></div>
    
    <div id="detail-panel">
        <div class="dp-close" onclick="closeDetailPanel()">✕</div>
        
        <div class="dp-main">
            <div class="dp-scale-box" id="dp-box">
                <span class="dp-scale-label">最大震度</span>
                <span class="dp-scale-value" id="dp-scale">-</span>
            </div>
            <div class="dp-info">
                <div class="dp-name" id="dp-name">----</div>
                <div class="dp-time" id="dp-time">--/-- --:-- 発生</div>
                <div class="dp-meta">
                    M <strong id="dp-mag">-.-</strong> / 深さ <strong id="dp-depth">--</strong>km
                </div>
            </div>
        </div>

        <div class="dp-toggle-btn" id="dp-toggle-btn" onclick="toggleExtendedArea()">詳細情報を表示 ▼</div>
        
        <div id="dp-extended-area" class="dp-extended-area collapsed">
            <div id="dp-comments" class="dp-comments-box"></div>
            <div id="dp-stations-list" class="dp-stations-container"></div>
        </div>
    </div>
</div>

<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([38.0, 137.0], 5);
    L.control.zoom({ position: 'topright' }).addTo(map);

    map.createPane('baseMapPane');
    map.getPane('baseMapPane').style.zIndex = 250;

    const allEarthquakesLayer = L.layerGroup().addTo(map);
    const detailLayer = L.layerGroup();
    let stationsData = [];

    const ZOOM_THRESHOLD = 9;
    map.on('zoomend', function() {
        const container = document.getElementById('map-container');
        if (map.getZoom() >= ZOOM_THRESHOLD) {
            container.classList.add('map-zoomed');
        } else {
            container.classList.remove('map-zoomed');
        }
    });

    Promise.all([
        fetch('./japan.geo.json').then(res => res.json()),
        fetch('./stations_with_amp_revised.json').then(res => res.json())
    ]).then(([geoData, stations]) => {
        L.geoJSON(geoData, {
            pane: 'baseMapPane',
            style: { color: "#3A3A3C", weight: 1, fillColor: "#1C1C1E", fillOpacity: 1 }
        }).addTo(map);
        
        stationsData = stations;
        fetchEarthquakeHistory();
    }).catch(err => console.error("データ読み込みエラー:", err));

    function getIntensityColor(scale) {
        switch (scale) {
            case 10: return '#64D2FF'; case 20: return '#0A84FF'; case 30: return '#30D158';
            case 40: return '#FFD60A'; case 45: return '#FF9F0A'; case 50: return '#FF453A';
            case 55: return '#FF2D55'; case 60: return '#BF5AF2'; case 70: return '#5E5CE6';
            default: return '#8E8E93';
        }
    }

    function getIntensityString(scale) {
        const scaleMap = { 10: "1", 20: "2", 30: "3", 40: "4", 45: "5弱", 50: "5強", 55: "6弱", 60: "6強", 70: "7" };
        return scaleMap[scale] || "?";
    }

    function getShortIntensityString(scale) {
        const scaleMap = { 10: "1", 20: "2", 30: "3", 40: "4", 45: "5-", 50: "5+", 55: "6-", 60: "6+", 70: "7" };
        return scaleMap[scale] || "?";
    }

    // ★改善: 詳細エリア（コメント＋リスト）の折りたたみトグル関数
    window.toggleExtendedArea = function() {
        const area = document.getElementById('dp-extended-area');
        const btn = document.getElementById('dp-toggle-btn');
        if (area.classList.contains('collapsed')) {
            area.classList.remove('collapsed');
            btn.innerHTML = '詳細情報を閉じる ▲';
        } else {
            area.classList.add('collapsed');
            btn.innerHTML = '詳細情報を表示 ▼';
        }
    };

    function fetchEarthquakeHistory() {
        fetch('https://api.p2pquake.net/v2/history?codes=551&limit=100')
            .then(res => res.json())
            .then(data => {
                const listContainer = document.getElementById('list-container');
                
                data.forEach((eq) => {
                    if (!eq.earthquake || !eq.earthquake.hypocenter) return;
                    
                    const hypo = eq.earthquake.hypocenter;
                    const maxScale = eq.earthquake.maxScale;

                    if (hypo.latitude === -200 || hypo.longitude === -200) return;
                    if (maxScale === undefined || maxScale === null || maxScale < 10) return;

                    const color = getIntensityColor(maxScale);
                    const d = new Date(eq.earthquake.time);
                    const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                    const radius = Math.max((hypo.magnitude || 4) * 2.5, 5);

                    const eqCircle = L.circleMarker([hypo.latitude, hypo.longitude], {
                        radius: radius, fillColor: color, color: color,
                        weight: 1.5, opacity: 0.9, fillOpacity: 0.4
                    }).bindTooltip(`${hypo.name} (M${hypo.magnitude})`).addTo(allEarthquakesLayer);

                    const listItem = document.createElement('div');
                    listItem.className = 'list-item';
                    listItem.style.borderLeftColor = color; 
                    listItem.innerHTML = `
                        <div class="list-item-title">
                            <span>${hypo.name || "不明"}</span>
                            <span style="color:${color};">震度${getIntensityString(maxScale)}</span>
                        </div>
                        <div class="list-item-details">${timeStr} | M${hypo.magnitude >= 0 ? hypo.magnitude : '-'}</div>
                    `;

                    const activateEarthquake = () => {
                        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
                        listItem.classList.add('active');
                        listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        showEarthquakeDetails(eq, color);
                    };

                    listItem.addEventListener('click', activateEarthquake);
                    eqCircle.on('click', activateEarthquake);

                    listContainer.appendChild(listItem);
                });
            });
    }

    function showEarthquakeDetails(eq, mainColor) {
        map.removeLayer(allEarthquakesLayer);
        detailLayer.clearLayers();
        map.addLayer(detailLayer);

        const hypo = eq.earthquake.hypocenter;
        
        const epicIcon = L.divIcon({
            className: 'epicenter-icon',
            html: '<div class="epicenter-cross">×</div>',
            iconSize: [0, 0]
        });
        L.marker([hypo.latitude, hypo.longitude], { icon: epicIcon, zIndexOffset: 20000 }).addTo(detailLayer);

        const stationsListContainer = document.getElementById('dp-stations-list');
        stationsListContainer.innerHTML = ''; 

        // ★追加: コメント情報の生成処理
        let commentText = "";
        
        // 1. 気象庁の津波予報テキストが存在すれば最優先で表示
        if (eq.comments && eq.comments.forecast && eq.comments.forecast.text) {
            commentText += `<strong>【津波予報】</strong><br>${eq.comments.forecast.text}`;
        } 
        // 2. なければ、APIの国内津波フラグからテキストを推測して生成
        else if (eq.earthquake && eq.earthquake.domesticTsunami) {
            const tsunamiMap = {
                "None": "この地震による津波の心配はありません。",
                "Unknown": "津波の影響は現在調査中です。",
                "Checking": "津波の影響は現在調査中です。",
                "NonEffective": "若干の海面変動が予想されますが、被害の心配はありません。",
                "Watch": "この地震により、津波注意報が発表されています。",
                "Warning": "この地震により、津波警報等（大津波警報・津波警報・津波注意報）が発表されています。"
            };
            commentText += `<strong>【津波情報】</strong><br>${tsunamiMap[eq.earthquake.domesticTsunami] || "津波に関する情報はありません。"}`;
        }

        // 3. 自由付加コメント（「この地震は〇〇の余震とみられます」等）があれば追記
        if (eq.comments && eq.comments.freeFormComment) {
            commentText += `<br><br><strong>【気象庁付加文】</strong><br>${eq.comments.freeFormComment}`;
        }
        
        document.getElementById('dp-comments').innerHTML = commentText;


        if (eq.points && eq.points.length > 0) {
            const listSortedPoints = [...eq.points].sort((a, b) => b.scale - a.scale);

            eq.points.forEach(p => {
                const scaleColor = getIntensityColor(p.scale);
                const scaleStr = getIntensityString(p.scale);
                const shortScaleStr = getShortIntensityString(p.scale);
                
                let matchedStations = stationsData.filter(st => st.name === p.addr);
                if (matchedStations.length === 0) {
                    matchedStations = stationsData.filter(st => st.name.includes(p.addr) || p.addr.includes(st.city.name));
                }

                matchedStations.forEach(st => {
                    const customIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `
                            <div class="station-dot" style="background-color: ${scaleColor};">
                                <span class="station-scale-text">${shortScaleStr}</span>
                            </div>
                        `,
                        iconSize: [0, 0] 
                    });

                    L.marker([st.lat, st.lon], { 
                        icon: customIcon,
                        zIndexOffset: p.scale * 100
                    })
                     .bindTooltip(`${st.name}<br>震度${scaleStr}`, { direction: 'top', className: 'custom-tooltip' })
                     .addTo(detailLayer);
                });
            });

            listSortedPoints.forEach(p => {
                const scaleColor = getIntensityColor(p.scale);
                const scaleStr = getIntensityString(p.scale);
                
                const item = document.createElement('div');
                item.className = 'dp-station-item';
                item.innerHTML = `
                    <span class="dp-station-name">${p.addr}</span>
                    <span class="dp-station-scale" style="background-color: ${scaleColor};">${scaleStr}</span>
                `;
                stationsListContainer.appendChild(item);
            });

        } else {
            stationsListContainer.innerHTML = '<div style="padding: 10px; text-align: center; color: var(--text-secondary); font-size: 13px;">詳細な観測点データがありません</div>';
        }

        map.setView([hypo.latitude, hypo.longitude], 7, { animate: true, duration: 0.5 });

        document.getElementById('dp-scale').innerText = getIntensityString(eq.earthquake.maxScale);
        document.getElementById('dp-scale').style.color = mainColor;
        document.getElementById('dp-box').style.borderColor = mainColor;
        document.getElementById('dp-name').innerText = hypo.name || "震源地不明";
        
        const d = new Date(eq.earthquake.time);
        document.getElementById('dp-time').innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} 発生`;
        document.getElementById('dp-mag').innerText = hypo.magnitude >= 0 ? hypo.magnitude.toFixed(1) : '-.-';
        document.getElementById('dp-depth').innerText = hypo.depth >= 0 ? hypo.depth : '--';

        // パネルを開く際、常に閉じた状態にリセットする
        document.getElementById('dp-extended-area').classList.add('collapsed');
        document.getElementById('dp-toggle-btn').innerHTML = '詳細情報を表示 ▼';
        document.getElementById('detail-panel').classList.add('show');
        
        // スクロール位置を一番上に戻す
        document.getElementById('dp-extended-area').scrollTop = 0;
    }

    window.closeDetailPanel = function() {
        document.getElementById('detail-panel').classList.remove('show');
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        
        map.removeLayer(detailLayer);
        map.addLayer(allEarthquakesLayer);
        map.setView([38.0, 137.0], 5, { animate: true });
    };

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        const grades = [10, 20, 30, 40, 45, 50, 55, 60, 70];
        const labels = ['1', '2', '3', '4', '5-', '5+', '6-', '6+', '7'];
        div.innerHTML = '<strong>最大震度</strong>';
        for (let i = 0; i < grades.length; i++) {
            div.innerHTML += '<div><i style="background:' + getIntensityColor(grades[i]) + '"></i> ' + labels[i] + '</div>';
        }
        return div;
    };
    legend.addTo(map);

    const style = document.createElement('style');
    style.innerHTML = `.custom-tooltip { background: rgba(0,0,0,0.8); border: 1px solid #555; color: #fff; font-size: 11px; backdrop-filter: blur(10px); }`;
    document.head.appendChild(style);

</script>
</body>
</html>
