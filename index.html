<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報可視化ツール - NERV List & HIG Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Base Variables */
        :root {
            --bg-color: #000000;
            --surface-color: rgba(28, 28, 30, 0.75);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(235, 235, 245, 0.6);
            --border-color: rgba(84, 84, 88, 0.5);
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            
            /* Tsunami Colors */
            --tsunami-major: #BF5AF2;  /* 紫: 大津波警報 */
            --tsunami-warning: #FF453A; /* 赤: 津波警報 */
            --tsunami-watch: #FFD60A;   /* 黄: 津波注意報 */
            --tsunami-slight: #64D2FF;  /* 水色: 若干の海面変動 */
            --tsunami-none: #8E8E93;    /* 灰: なし・調査中 */
        }

        body { 
            margin: 0; padding: 0; display: flex; height: 100vh; 
            background-color: var(--bg-color); color: var(--text-primary); 
            font-family: var(--font-family); overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* -------------------------------------
           サイドバー ＆ タブUI
           ------------------------------------- */
        #sidebar {
            width: 260px; min-width: 260px;
            background: var(--surface-color);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            z-index: 1000; box-shadow: 2px 0 20px rgba(0,0,0,0.8);
        }

        .sidebar-header {
            display: flex; padding: 12px 10px; gap: 6px;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1; text-align: center; padding: 8px 0;
            font-size: 12px; font-weight: 600; color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05); border-radius: 8px;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .tab-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .tab-btn.active {
            color: #fff; background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        #list-container, #tsunami-list-container, #kyoshin-list-container { 
            flex-grow: 1; overflow-y: auto; padding: 8px; scroll-behavior: smooth; 
        }
        #list-container::-webkit-scrollbar, #tsunami-list-container::-webkit-scrollbar, #kyoshin-list-container::-webkit-scrollbar { width: 0px; }

        .list-item, .t-list-item {
            padding: 10px; margin-bottom: 4px;
            border-radius: 8px; cursor: pointer;
            border-left: 4px solid transparent; 
            background: rgba(255,255,255,0.02);
            transition: background-color 0.2s, transform 0.1s;
        }
        .list-item:hover, .t-list-item:hover { background-color: rgba(255, 255, 255, 0.08); }
        .list-item.active, .t-list-item.active { background-color: rgba(255, 255, 255, 0.15); }
        
        .list-item-title, .t-list-item-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between;}
        .list-item-details, .t-list-item-details { font-size: 11px; color: var(--text-secondary); }

        .kyoshin-status-box {
            padding: 20px; text-align: center; color: var(--text-secondary); font-size: 13px; line-height: 1.6;
        }
        .live-indicator {
            display: inline-block; width: 8px; height: 8px; background-color: #30D158; border-radius: 50%;
            margin-right: 6px; box-shadow: 0 0 8px #30D158; animation: pulse 1.5s infinite;
        }
        .live-indicator.error {
            background-color: #FF453A; box-shadow: 0 0 8px #FF453A;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        #kmoni-debug-canvas {
            display: none; /* デバッグ時はブロックにして表示できます */
            position: absolute; bottom: 10px; left: 10px; z-index: 9999;
            border: 1px solid #fff; background: #000;
            width: 176px; height: 200px; /* 元画像は352x400 */
        }

        /* -------------------------------------
           メインマップ＆凡例
           ------------------------------------- */
        #map-container { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 100%; background-color: #0c0c0e; }

        .legend {
            background: var(--surface-color); backdrop-filter: blur(20px);
            padding: 10px 14px; border-radius: 12px; border: 0.5px solid var(--border-color);
            line-height: 1.6; color: var(--text-primary); font-size: 12px;
        }
        .legend strong { display: block; margin-bottom: 6px; font-size: 13px; }
        .legend i { width: 12px; height: 12px; float: left; margin-top: 4px; margin-right: 8px; border-radius: 50%; }

        /* -------------------------------------
           パネル共通 閉じるボタン
           ------------------------------------- */
        .dp-close, .tp-close {
            position: absolute; top: 12px; right: 12px; width: 28px; height: 28px;
            background: rgba(255,255,255,0.1); border-radius: 50%; text-align: center;
            line-height: 28px; font-size: 14px; cursor: pointer; color: #fff; z-index: 10;
        }
        .dp-close:hover, .tp-close:hover { background: rgba(255,255,255,0.2); }

        /* -------------------------------------
           Leaflet UI (設定ボタン＆ズーム)
           ------------------------------------- */
        .leaflet-bar {
            border: 0.5px solid var(--border-color) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6) !important;
            border-radius: 10px !important;
            overflow: hidden;
        }
        .leaflet-bar a {
            background-color: var(--surface-color) !important;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            color: var(--text-primary) !important;
            border-bottom: 0.5px solid var(--border-color) !important;
            width: 36px !important; height: 36px !important;
            line-height: 36px !important;
            transition: background-color 0.2s, color 0.2s;
        }
        .leaflet-bar a:hover {
            background-color: rgba(255, 255, 255, 0.15) !important;
        }
        .leaflet-bar a:last-child {
            border-bottom: none !important;
        }
        .leaflet-bar a.leaflet-disabled {
            color: rgba(255, 255, 255, 0.3) !important;
            background-color: var(--surface-color) !important;
            cursor: default;
        }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            font-size: 18px !important; font-weight: 500 !important;
        }

        .custom-settings-btn { margin-bottom: 12px !important; }
        .custom-settings-btn a { display: flex !important; align-items: center; justify-content: center; }

        /* -------------------------------------
           メイン詳細パネル (地震用)
           ------------------------------------- */
        #detail-panel {
            position: absolute; bottom: -600px; left: 10px;
            width: 280px; max-width: calc(100vw - 20px);
            background: rgba(28, 28, 30, 0.45); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid var(--border-color); border-radius: 16px;
            padding: 16px 14px 12px 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 1000; transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none; display: flex; flex-direction: column;
        }
        #detail-panel.show { bottom: 20px; pointer-events: auto; }

        .dp-main { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .dp-scale-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 12px; padding: 10px 8px; min-width: 64px;
            background: rgba(0,0,0,0.3); border: 2px solid transparent;
        }
        .dp-scale-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; } 
        .dp-scale-value { font-size: 34px; font-weight: 700; line-height: 1; } 
        
        .dp-info { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; padding-right: 24px; }
        .dp-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } 
        .dp-time { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; } 
        .dp-meta { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } 
        .dp-meta strong { font-size: 15px; color: #fff; }

        .dp-toggle-btn {
            margin-top: 12px; padding: 10px 0 4px 0; text-align: center;
            font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer;
            border-top: 1px solid rgba(255,255,255,0.1); transition: color 0.2s;
        }
        .dp-toggle-btn:hover { color: #fff; }

        .dp-extended-area {
            overflow-y: auto; padding-right: 4px;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.4s ease;
            max-height: 300px; opacity: 1; margin-top: 10px; display: flex; flex-direction: column; gap: 10px;
        }
        .dp-extended-area.collapsed {
            max-height: 0; opacity: 0; margin-top: 0; overflow: hidden; padding-top: 0; padding-bottom: 0;
        }
        .dp-extended-area::-webkit-scrollbar { width: 4px; }
        .dp-extended-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .dp-comments-box {
            background: rgba(0, 0, 0, 0.5); border-radius: 8px; padding: 12px 14px;
            font-size: 13px; line-height: 1.5; color: #e5e5ea; 
            border-left: 4px solid var(--tsunami-none);
            position: relative; transition: background-color 0.2s;
        }
        .dp-comments-box.clickable { cursor: pointer; }
        .dp-comments-box.clickable:hover { background: rgba(255, 255, 255, 0.1); }
        .dp-comments-hint {
            display: none; position: absolute; right: 12px; bottom: 8px;
            font-size: 11px; font-weight: bold; color: var(--text-secondary);
        }
        .dp-comments-box.clickable .dp-comments-hint { display: block; }

        .dp-stations-container { display: flex; flex-direction: column; }
        .dp-station-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .dp-station-item:last-child { border-bottom: none; }
        .dp-station-name { font-size: 14px; color: #e5e5ea; } 
        .dp-station-scale { font-size: 13px; font-weight: 700; color: #fff; padding: 4px 10px; border-radius: 6px; }

        /* -------------------------------------
           津波詳細サブパネル
           ------------------------------------- */
        #tsunami-panel {
            position: absolute; top: 60px; right: 10px;
            width: 280px; max-width: calc(100vw - 20px); max-height: 40vh; 
            background: rgba(28, 28, 30, 0.45); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid var(--border-color); border-radius: 16px;
            padding: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 1000; opacity: 0; transform: translateX(20px); pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #tsunami-panel.show { opacity: 1; transform: translateX(0); pointer-events: auto; }
        
        .tp-header {
            font-size: 16px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 10px; margin-bottom: 10px; color: #fff; padding-right: 28px; flex-shrink: 0;
        }
        .tp-list { overflow-y: auto; padding-right: 4px; flex-grow: 1; }
        .tp-list::-webkit-scrollbar { width: 4px; }
        .tp-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .tp-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .tp-item:last-child { border-bottom: none; }
        .tp-area { font-size: 15px; font-weight: 600; color: #e5e5ea; } 
        .tp-details { font-size: 13px; color: var(--text-secondary); text-align: right;} 
        .tp-height { font-size: 15px; font-weight: bold; margin-left: 8px;} 

        /* マーカー等の既存スタイル */
        .epicenter-cross { color: #ff3b30; font-size: 24px; font-weight: bold; line-height: 24px; text-align: center; text-shadow: 0 0 5px #000; position: absolute; top: -12px; left: -12px; width: 24px; height: 24px; }
        .custom-div-icon { overflow: visible; }
        .station-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1.5px solid #ffffff; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.6); width: 14px; height: 14px; transition: width 0.3s, height 0.3s; }
        .station-scale-text { display: none; color: #ffffff; font-weight: 800; font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.6); letter-spacing: -0.5px; line-height: 1; transform: translateY(0.5px); }
        .map-zoomed .station-dot { width: 24px; height: 24px; border-width: 1.5px; }
        .map-zoomed .station-scale-text { display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <div class="tab-btn active" onclick="switchTab('history')">地震履歴</div>
        <div class="tab-btn" onclick="switchTab('tsunami')">津波情報</div>
        <div class="tab-btn" onclick="switchTab('kyoshin')">強震モニタ</div>
    </div>
    <div id="list-container"></div>
    <div id="tsunami-list-container" style="display: none;"></div>
    <div id="kyoshin-list-container" style="display: none;">
        <div class="kyoshin-status-box">
            <span id="kmoni-indicator" class="live-indicator"></span><strong id="kmoni-status-text">リアルタイム監視中</strong><br><br>
            <span id="kmoni-time" style="font-family: monospace; font-size: 14px; color: #fff;">----/--/-- --:--:--</span><br><br>
            画像解析方式でデータを取得・プロットしています。<br>
            <span style="font-size: 10px; color: #888;">※CORSプロキシを経由しています</span>
        </div>
    </div>
</div>

<div id="map-container">
    <div id="map"></div>
    <canvas id="kmoni-debug-canvas" width="352" height="400"></canvas>
    
    <div id="detail-panel">
        <div class="dp-close" onclick="closeDetailPanel()">✕</div>
        <div class="dp-main">
            <div class="dp-scale-box" id="dp-box">
                <span class="dp-scale-label">最大震度</span>
                <span class="dp-scale-value" id="dp-scale">-</span>
            </div>
            <div class="dp-info">
                <div class="dp-name" id="dp-name" title="----">----</div>
                <div class="dp-time" id="dp-time">--/-- --:-- 発生</div>
                <div class="dp-meta">
                    M <strong id="dp-mag">-.-</strong> / 深さ <strong id="dp-depth">--</strong>km
                </div>
            </div>
        </div>
        <div class="dp-toggle-btn" id="dp-toggle-btn" onclick="toggleExtendedArea()">詳細情報を表示 ▼</div>
        <div id="dp-extended-area" class="dp-extended-area collapsed">
            <div id="dp-comments" class="dp-comments-box" onclick="toggleTsunamiPanelFromEarthquake()">
                <div id="dp-comments-text"></div>
                <div class="dp-comments-hint">詳細情報を確認 ▶</div>
            </div>
            <div id="dp-stations-list" class="dp-stations-container"></div>
        </div>
    </div>

    <div id="tsunami-panel">
        <div class="tp-close" onclick="closeTsunamiPanel()">✕</div>
        <div class="tp-header" id="tp-main-header">津波到達予想</div>
        <div class="tp-list"></div>
    </div>
</div>

<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([38.0, 137.0], 5);

    // カスタム設定ボタン
    const SettingsControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function (map) {
            const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control custom-settings-btn');
            container.innerHTML = `<a href="#" title="設定" role="button"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></a>`;
            container.onclick = function(e){ e.preventDefault(); alert("設定は今後のアップデートで実装予定です！"); }
            return container;
        }
    });
    map.addControl(new SettingsControl());
    L.control.zoom({ position: 'topright' }).addTo(map);

    map.createPane('baseMapPane'); map.getPane('baseMapPane').style.zIndex = 250;
    map.createPane('tsunamiPane'); map.getPane('tsunamiPane').style.zIndex = 260; 

    const allEarthquakesLayer = L.layerGroup().addTo(map);
    const detailLayer = L.layerGroup();
    const tsunamiLineLayer = L.layerGroup().addTo(map); 

    // ==========================================
    // 【強震モニタ】 解析用ロジック ＆ レイヤー
    // ==========================================
    function rgbToShindo(r, g, b) {
        if (r === 0 && g === 0 && b === 0) return -999;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        if (max === min) return -999;
        
        let h = 0;
        if (max === r) h = 60 * ((g - b) / (max - min)) + (g < b ? 360 : 0);
        else if (max === g) h = 60 * ((b - r) / (max - min)) + 120;
        else if (max === b) h = 60 * ((r - g) / (max - min)) + 240;
        
        let shindo = -3;
        if (h > 240) shindo = -3;
        else if (h > 180) shindo = -3 + (240 - h) / 60 * 1.5;
        else if (h > 120) shindo = -1.5 + (180 - h) / 60 * 1.5;
        else if (h > 60) shindo = 0 + (120 - h) / 60 * 2.0;
        else if (h > 30) shindo = 2.0 + (60 - h) / 30 * 2.0;
        else shindo = 4.0 + (30 - h) / 30 * 3.0;
        
        return shindo;
    }

    function latLngToKmoniPixel(lat, lng) {
        const minLat = 30.0, maxLat = 46.0;
        const minLng = 128.0, maxLng = 146.0;
        const width = 352, height = 400;
        
        let x = ((lng - minLng) / (maxLng - minLng)) * width;
        let y = height - (((lat - minLat) / (maxLat - minLat)) * height);
        
        return { x: Math.round(x), y: Math.round(y) };
    }

    L.KyoshinMonitorLayer = L.Layer.extend({
        initialize: function (stations, options) {
            L.setOptions(this, options);
            this._stations = stations.map(st => {
                const px = latLngToKmoniPixel(parseFloat(st.lat), parseFloat(st.lon));
                return { ...st, kx: px.x, ky: px.y, currentShindo: -999 };
            });
        },
        onAdd: function (map) {
            this._map = map;
            this._canvas = L.DomUtil.create('canvas', 'leaflet-kyoshin-layer leaflet-zoom-animated');
            this._canvas.style.zIndex = 255; 
            map.getPane(this.options.pane || 'overlayPane').appendChild(this._canvas);
            this._ctx = this._canvas.getContext('2d');
            map.on('moveend zoomend resize', this._updatePosition, this);
            this._updatePosition();
        },
        onRemove: function (map) {
            L.DomUtil.remove(this._canvas);
            map.off('moveend zoomend resize', this._updatePosition, this);
        },
        _updatePosition: function () {
            const size = this._map.getSize();
            const topLeft = this._map.containerPointToLayerPoint([0, 0]);
            L.DomUtil.setPosition(this._canvas, topLeft);
            this._canvas.width = size.x;
            this._canvas.height = size.y;
            for (let i = 0; i < this._stations.length; i++) {
                const st = this._stations[i];
                const p = this._map.latLngToContainerPoint([parseFloat(st.lat), parseFloat(st.lon)]);
                st.cx = p.x; st.cy = p.y;
            }
            this.redraw();
        },
        updateFromImageData: function(imgData) {
            if (!imgData) return;
            const data = imgData.data;
            const width = imgData.width;
            
            for(let i = 0; i < this._stations.length; i++){
                const st = this._stations[i];
                if(st.kx < 0 || st.kx >= width || st.ky < 0 || st.ky >= imgData.height) continue;
                
                const idx = (st.ky * width + st.kx) * 4;
                const r = data[idx];
                const g = data[idx+1];
                const b = data[idx+2];
                
                st.currentShindo = rgbToShindo(r, g, b);
            }
            this.redraw();
        },
        redraw: function () {
            if (!this._ctx) return;
            const ctx = this._ctx;
            ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
            for (let i = 0; i < this._stations.length; i++) {
                const st = this._stations[i];
                if (st.currentShindo <= -3) continue;
                if (st.cx < 0 || st.cy < 0 || st.cx > this._canvas.width || st.cy > this._canvas.height) continue;
                
                ctx.beginPath();
                ctx.arc(st.cx, st.cy, this._getRadius(st.currentShindo), 0, Math.PI * 2);
                ctx.fillStyle = this._getColor(st.currentShindo);
                ctx.fill();
            }
        },
        _getColor: function(v) {
            if (v < 0.5) return 'rgba(100, 210, 255, 0.4)';  
            if (v < 1.5) return 'rgba(10, 132, 255, 0.6)';  
            if (v < 2.5) return 'rgba(48, 209, 88, 0.8)';   
            if (v < 3.5) return 'rgba(255, 214, 10, 0.9)';  
            if (v < 4.5) return 'rgba(255, 159, 10, 0.9)';  
            if (v < 5.5) return 'rgba(255, 69, 58, 1)';     
            return 'rgba(191, 90, 242, 1)';                 
        },
        _getRadius: function(v) { return Math.max(2, (v+1) * 1.5); }
    });

    let kyoshinLayer = null;
    let kmoniInterval = null;
    let isKyoshinActive = false;
    const debugCanvas = document.getElementById('kmoni-debug-canvas');
    const debugCtx = debugCanvas.getContext('2d', { willReadFrequently: true });

    function fetchKmoniImage() {
        if (!isKyoshinActive) return;

        const now = new Date(Date.now() - 2000);
        const yyyy = now.getFullYear();
        const MM = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        const timeStr = `${yyyy}${MM}${dd}${hh}${mm}${ss}`;
        const dateStr = `${yyyy}${MM}${dd}`;
        
        document.getElementById('kmoni-time').innerText = `${yyyy}/${MM}/${dd} ${hh}:${mm}:${ss}`;

        const imgUrl = `http://www.kmoni.bosai.go.jp/data/map_img/RealTimeImg/jma_s/${dateStr}/${timeStr}.png`;
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(imgUrl)}`;

        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
            document.getElementById('kmoni-indicator').classList.remove('error');
            document.getElementById('kmoni-status-text').innerText = "リアルタイム監視中";
            
            debugCtx.clearRect(0, 0, 352, 400);
            debugCtx.drawImage(img, 0, 0);
            const imgData = debugCtx.getImageData(0, 0, 352, 400);
            
            if(kyoshinLayer) kyoshinLayer.updateFromImageData(imgData);
        };
        img.onerror = () => {
            document.getElementById('kmoni-indicator').classList.add('error');
            document.getElementById('kmoni-status-text').innerText = "データ待機中...";
        };
        img.src = proxyUrl;
    }

    function startKyoshinMonitor() {
        isKyoshinActive = true;
        fetchKmoniImage();
        kmoniInterval = setInterval(fetchKmoniImage, 1000);
    }
    
    function stopKyoshinMonitor() {
        isKyoshinActive = false;
        if(kmoniInterval) clearInterval(kmoniInterval);
    }

    // ==========================================

    let tsunamiDataList = [];

    function safeFormatDateString(rawTimeStr) {
        if (!rawTimeStr) return "--/-- --:--";
        const safeStr = rawTimeStr.replace(/-/g, '/').replace(/T/, ' ').replace(/\+.*/, '').replace(/Z/, '');
        const d = new Date(safeStr);
        if (isNaN(d.getTime())) return rawTimeStr; 
        return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }
    function getSafeDateObj(rawTimeStr) {
        if (!rawTimeStr) return new Date(NaN);
        const safeStr = rawTimeStr.replace(/-/g, '/').replace(/T/, ' ').replace(/\+.*/, '').replace(/Z/, '');
        return new Date(safeStr);
    }

    function getIntensityColor(scale) {
        switch (scale) {
            case 10: return '#64D2FF'; case 20: return '#0A84FF'; case 30: return '#30D158';
            case 40: return '#FFD60A'; case 45: return '#FF9F0A'; case 50: return '#FF453A';
            case 55: return '#FF2D55'; case 60: return '#BF5AF2'; case 70: return '#5E5CE6';
            default: return '#8E8E93';
        }
    }
    function getIntensityString(scale) {
        const scaleMap = { 10: "1", 20: "2", 30: "3", 40: "4", 45: "5弱", 50: "5強", 55: "6弱", 60: "6強", 70: "7" };
        return scaleMap[scale] || "?";
    }
    function getShortIntensityString(scale) {
        const scaleMap = { 10: "1", 20: "2", 30: "3", 40: "4", 45: "5-", 50: "5+", 55: "6-", 60: "6+", 70: "7" };
        return scaleMap[scale] || "?";
    }

    let legendDiv = null;
    function updateLegend(type) {
        if (!legendDiv) return;
        let html = '';
        if (type === 'earthquake') {
            const grades = [10, 20, 30, 40, 45, 50, 55, 60, 70];
            const labels = ['1', '2', '3', '4', '5-', '5+', '6-', '6+', '7'];
            html = '<strong>最大震度</strong>';
            for (let i = 0; i < grades.length; i++) html += '<div><i style="background:' + getIntensityColor(grades[i]) + '"></i> ' + labels[i] + '</div>';
        } else if (type === 'tsunami') {
            const colors = ['#BF5AF2', '#FF453A', '#FFD60A', '#64D2FF', '#8E8E93'];
            const labels = ['大津波警報', '津波警報', '津波注意報', '若干の海面変動', '調査中・解除'];
            html = '<strong>津波予報</strong>';
            for (let i = 0; i < colors.length; i++) html += '<div><i style="background:' + colors[i] + '"></i> ' + labels[i] + '</div>';
        } else if (type === 'kyoshin') {
            const colors = ['#64D2FF', '#0A84FF', '#30D158', '#FFD60A', '#FF9F0A', '#FF453A', '#BF5AF2'];
            const labels = ['0', '1', '2', '3', '4', '5', '6強'];
            html = '<strong>リアルタイム震度</strong>';
            for (let i = 0; i < colors.length; i++) html += '<div><i style="background:' + colors[i] + '"></i> ' + labels[i] + '</div>';
        }
        legendDiv.innerHTML = html;
    }

    // UI イベント制御
    // ==========================================
    window.switchTab = function(tabName) {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs[0].classList.toggle('active', tabName === 'history');
        tabs[1].classList.toggle('active', tabName === 'tsunami');
        tabs[2].classList.toggle('active', tabName === 'kyoshin');

        document.getElementById('list-container').style.display = tabName === 'history' ? 'block' : 'none';
        document.getElementById('tsunami-list-container').style.display = tabName === 'tsunami' ? 'block' : 'none';
        document.getElementById('kyoshin-list-container').style.display = tabName === 'kyoshin' ? 'block' : 'none';
        
        closeDetailPanel();
        closeTsunamiPanel();

        if (tabName === 'kyoshin') {
            if (map.hasLayer(allEarthquakesLayer)) map.removeLayer(allEarthquakesLayer);
            if (kyoshinLayer && !map.hasLayer(kyoshinLayer)) map.addLayer(kyoshinLayer);
            startKyoshinMonitor();
            updateLegend('kyoshin');
        } else {
            stopKyoshinMonitor();
            if (kyoshinLayer && map.hasLayer(kyoshinLayer)) map.removeLayer(kyoshinLayer);
            
            if (tabName === 'tsunami') {
                if (map.hasLayer(allEarthquakesLayer)) map.removeLayer(allEarthquakesLayer);
                if (!isTsunamiListRendered) { renderTsunamiList(); isTsunamiListRendered = true; }
                updateLegend('tsunami');
            } else {
                if (!map.hasLayer(allEarthquakesLayer)) map.addLayer(allEarthquakesLayer);
                updateLegend('earthquake');
            }
        }
    };

    function fetchEarthquakeHistory() {
        fetch('https://api.p2pquake.net/v2/history?codes=551&limit=100')
            .then(res => res.json())
            .then(data => {
                const listContainer = document.getElementById('list-container');
                data.forEach((eq) => {
                    if (!eq.earthquake || !eq.earthquake.hypocenter) return;
                    const hypo = eq.earthquake.hypocenter;
                    const maxScale = eq.earthquake.maxScale;
                    if (hypo.latitude === -200 || hypo.longitude === -200) return;
                    if (maxScale === undefined || maxScale === null || maxScale < 10) return;

                    const color = getIntensityColor(maxScale);
                    const timeStr = safeFormatDateString(eq.earthquake.time);
                    const radius = Math.max((hypo.magnitude || 4) * 2.5, 5);

                    const eqCircle = L.circleMarker([hypo.latitude, hypo.longitude], {
                        radius: radius, fillColor: color, color: color, weight: 1.5, opacity: 0.9, fillOpacity: 0.4
                    }).bindTooltip(`${hypo.name} (M${hypo.magnitude})`).addTo(allEarthquakesLayer);

                    const listItem = document.createElement('div');
                    listItem.className = 'list-item';
                    listItem.style.borderLeftColor = color; 
                    listItem.innerHTML = `
                        <div class="list-item-title"><span>${hypo.name || "不明"}</span><span style="color:${color};">震度${getIntensityString(maxScale)}</span></div>
                        <div class="list-item-details">${timeStr} | M${hypo.magnitude >= 0 ? hypo.magnitude : '-'}</div>
                    `;

                    const activateEarthquake = () => {
                        if (listItem.classList.contains('active')) { closeDetailPanel(); return; }
                        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
                        listItem.classList.add('active');
                        listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        showEarthquakeDetails(eq, color);
                    };

                    listItem.addEventListener('click', activateEarthquake);
                    eqCircle.on('click', activateEarthquake);
                    listContainer.appendChild(listItem);
                });
            });
    }

    function drawTsunamiCoastlines(matchedData) {
        tsunamiLineLayer.clearLayers(); 
        if (!tsunamiGeoData || !matchedData || !matchedData.areas || matchedData.cancelled) return; 

        const gradeMap = new Map();
        matchedData.areas.forEach(area => gradeMap.set(area.name, area.grade));

        L.geoJSON(tsunamiGeoData, {
            pane: 'tsunamiPane',
            filter: function(feature) {
                const featureName = feature.properties.name || feature.properties.NAME || feature.properties.name_ja;
                return gradeMap.has(featureName);
            },
            style: function(feature) {
                const featureName = feature.properties.name || feature.properties.NAME || feature.properties.name_ja;
                const grade = gradeMap.get(featureName);
                let lineColor = '#8E8E93'; 
                if (grade === "MajorWarning") lineColor = '#BF5AF2'; 
                else if (grade === "Warning") lineColor = '#FF453A'; 
                else if (grade === "Watch") lineColor = '#FFD60A';   
                else if (grade === "NonEffective") lineColor = '#64D2FF'; 
                return { color: lineColor, weight: 6, opacity: 0.9, lineJoin: 'round' };
            }
        }).addTo(tsunamiLineLayer);
    }

    function renderTsunamiList() {
        const container = document.getElementById('tsunami-list-container');
        container.innerHTML = '';
        if (isTsunamiFetchError) {
            container.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--tsunami-warning); font-size: 13px; line-height: 1.5;">津波データの取得に失敗しました。<br>通信環境を確認して再読み込みしてください。</div>`;
            return;
        }
        if (!tsunamiDataList || tsunamiDataList.length === 0) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 13px;">津波情報はありません</div>'; return;
        }

        let renderCount = 0;
        tsunamiDataList.forEach((tInfo) => {
            let maxGrade = "Unknown", color = "var(--tsunami-none)", title = "津波情報";
            if (tInfo.cancelled) {
                title = "津波予報・警報 (解除など)"; color = "var(--tsunami-none)";
            } else {
                const gradeWeight = { "MajorWarning": 3, "Warning": 2, "Watch": 1, "NonEffective": 0.5, "Unknown": 0 };
                let highestWeight = -1;
                if (tInfo.areas) {
                    tInfo.areas.forEach(area => {
                        const w = gradeWeight[area.grade] || 0;
                        if (w > highestWeight) { highestWeight = w; maxGrade = area.grade; }
                    });
                }
                if (maxGrade === "MajorWarning") { color = "var(--tsunami-major)"; title = "大津波警報"; }
                else if (maxGrade === "Warning") { color = "var(--tsunami-warning)"; title = "津波警報"; }
                else if (maxGrade === "Watch") { color = "var(--tsunami-watch)"; title = "津波注意報"; }
                else if (highestWeight === 0.5) { color = "var(--tsunami-slight)"; title = "若干の海面変動"; }
                else { color = "var(--tsunami-none)"; title = "津波情報 (調査中等)"; }
            }

            const rawTime = tInfo.time || (tInfo.issue && tInfo.issue.time) || tInfo.created_at;
            const timeStr = safeFormatDateString(rawTime);

            const item = document.createElement('div');
            item.className = 't-list-item'; item.style.borderLeftColor = color;
            item.innerHTML = `<div class="t-list-item-title"><span style="color: ${color};">${title}</span></div><div class="t-list-item-details">${timeStr} 発表</div>`;

            item.addEventListener('click', () => {
                if (item.classList.contains('active')) { closeTsunamiPanel(); return; }
                document.querySelectorAll('.t-list-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                
                document.getElementById('detail-panel').classList.remove('show');
                document.getElementById('tp-main-header').innerText = title + " (発表内容)";
                
                updateTsunamiPanelUI(tInfo);
                document.getElementById('tsunami-panel').classList.add('show');
                drawTsunamiCoastlines(tInfo);
            });
            container.appendChild(item); renderCount++;
        });

        if (renderCount === 0) container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 13px;">表示できる津波情報がありません</div>';
    }

    function getMatchingTsunamiInfo(eqTimeStr) {
        const eqTime = getSafeDateObj(eqTimeStr).getTime();
        let matched = null, minDiff = Infinity;
        tsunamiDataList.forEach(tInfo => {
            if (tInfo.cancelled) return; 
            const rawTime = tInfo.time || (tInfo.issue && tInfo.issue.time) || tInfo.created_at;
            const tTime = getSafeDateObj(rawTime).getTime();
            if (isNaN(tTime) || isNaN(eqTime)) return;
            const diff = Math.abs(tTime - eqTime); 
            if (diff <= 7200000 && diff < minDiff) { minDiff = diff; matched = tInfo; }
        });
        return matched;
    }

    function updateTsunamiPanelUI(matchedData) {
        const listContainer = document.querySelector('#tsunami-panel .tp-list');
        listContainer.innerHTML = ''; 
        if (matchedData && matchedData.cancelled) {
             listContainer.innerHTML = `<div class="tp-item"><div class="tp-area" style="color: var(--tsunami-none); line-height: 1.5;">発表されていた津波に関する予報・警報は、すべて解除されたか、発表期限が過ぎています。</div></div>`;
             return;
        }
        if (!matchedData || !matchedData.areas || matchedData.areas.length === 0) {
            listContainer.innerHTML = `<div class="tp-item"><div class="tp-area" style="color: var(--text-secondary);">詳細データが見つかりません</div></div>`; return;
        }

        const gradeWeight = { "MajorWarning": 3, "Warning": 2, "Watch": 1, "Unknown": 0 };
        const sortedAreas = matchedData.areas.sort((a, b) => (gradeWeight[b.grade] || 0) - (gradeWeight[a.grade] || 0));

        sortedAreas.forEach(area => {
            const item = document.createElement('div');
            item.className = 'tp-item';
            let colorVar = "var(--tsunami-none)";
            if (area.grade === "MajorWarning") colorVar = "var(--tsunami-major)";
            else if (area.grade === "Warning") colorVar = "var(--tsunami-warning)";
            else if (area.grade === "Watch") colorVar = "var(--tsunami-watch)";
            else if (area.grade === "NonEffective") colorVar = "var(--tsunami-slight)";

            let timeText = "--:--";
            if (area.firstHeight) {
                if (area.firstHeight.condition) timeText = area.firstHeight.condition;
                else if (area.firstHeight.time) {
                    const d = getSafeDateObj(area.firstHeight.time);
                    if (!isNaN(d.getTime())) timeText = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    else timeText = area.firstHeight.time;
                }
            }
            let heightText = area.maxHeight && area.maxHeight.description ? area.maxHeight.description : "";
            item.innerHTML = `<div class="tp-area" style="color: ${colorVar};">${area.name}</div><div class="tp-details">${timeText}<span class="tp-height" style="color: ${colorVar};">${heightText}</span></div>`;
            listContainer.appendChild(item);
        });
    }

    function showEarthquakeDetails(eq, mainColor) {
        map.removeLayer(allEarthquakesLayer);
        if (kyoshinLayer && map.hasLayer(kyoshinLayer)) map.removeLayer(kyoshinLayer); 
        detailLayer.clearLayers();
        tsunamiLineLayer.clearLayers(); 
        map.addLayer(detailLayer);
        closeTsunamiPanel(); 

        const hypo = eq.earthquake.hypocenter;
        const epicIcon = L.divIcon({ className: 'epicenter-icon', html: '<div class="epicenter-cross">×</div>', iconSize: [0, 0] });
        L.marker([hypo.latitude, hypo.longitude], { icon: epicIcon, zIndexOffset: 20000 }).addTo(detailLayer);

        const stationsListContainer = document.getElementById('dp-stations-list');
        stationsListContainer.innerHTML = ''; 

        let commentHtml = "", tStatus = eq.earthquake && eq.earthquake.domesticTsunami ? eq.earthquake.domesticTsunami : "None";
        let tColorVar = "var(--tsunami-none)", isTsunamiActive = false; 

        switch (tStatus) {
            case "None": commentHtml += `<strong>【津波情報】</strong><br>この地震による津波の心配はありません。`; break;
            case "Unknown":
            case "Checking": commentHtml += `<strong>【津波情報】</strong><br>津波の影響は現在調査中です。`; break;
            case "NonEffective": tColorVar = "var(--tsunami-slight)"; commentHtml += `<strong>【津波情報】</strong><br>若干の海面変動が予想されますが、被害の心配はありません。`; isTsunamiActive = true; break;
            case "Watch": tColorVar = "var(--tsunami-watch)"; commentHtml += `<strong>【津波情報】</strong><br>この地震により、津波注意報が発表されています。`; isTsunamiActive = true; break;
            case "Warning": tColorVar = "var(--tsunami-warning)"; commentHtml += `<strong>【津波情報】</strong><br>この地震により、津波警報が発表されています。`; isTsunamiActive = true; break;
            case "MajorWarning": tColorVar = "var(--tsunami-major)"; commentHtml += `<strong>【津波情報】</strong><br>この地震により、大津波警報が発表されています。`; isTsunamiActive = true; break;
            default:
                if (eq.comments && eq.comments.forecast && eq.comments.forecast.text) commentHtml += `<strong>【津波予報】</strong><br>${eq.comments.forecast.text}`;
                else commentHtml += `<strong>【津波情報】</strong><br>津波に関する情報はありません。`;
        }
        if (eq.comments && eq.comments.freeFormComment) commentHtml += `<br><br><strong>【気象庁付加文】</strong><br>${eq.comments.freeFormComment}`;
        
        const commentsBox = document.getElementById('dp-comments');
        document.getElementById('dp-comments-text').innerHTML = commentHtml;
        commentsBox.style.borderLeftColor = tColorVar;

        if (isTsunamiActive) {
            commentsBox.classList.add('clickable');
            const matchedTsunami = getMatchingTsunamiInfo(eq.earthquake.time);
            updateTsunamiPanelUI(matchedTsunami); drawTsunamiCoastlines(matchedTsunami);
        } else commentsBox.classList.remove('clickable');

        if (eq.points && eq.points.length > 0) {
            const listSortedPoints = [...eq.points].sort((a, b) => b.scale - a.scale);
            eq.points.forEach(p => {
                const scaleColor = getIntensityColor(p.scale), scaleStr = getIntensityString(p.scale), shortScaleStr = getShortIntensityString(p.scale);
                let matchedStations = stationsData.filter(st => st.name === p.addr);
                if (matchedStations.length === 0) matchedStations = stationsData.filter(st => st.name.includes(p.addr) || p.addr.includes(st.city.name));

                matchedStations.forEach(st => {
                    const customIcon = L.divIcon({ className: 'custom-div-icon', html: `<div class="station-dot" style="background-color: ${scaleColor};"><span class="station-scale-text">${shortScaleStr}</span></div>`, iconSize: [0, 0] });
                    L.marker([st.lat, st.lon], { icon: customIcon, zIndexOffset: p.scale * 100 }).bindTooltip(`${st.name}<br>震度${scaleStr}`, { direction: 'top', className: 'custom-tooltip' }).addTo(detailLayer);
                });
            });

            listSortedPoints.forEach(p => {
                const scaleColor = getIntensityColor(p.scale), scaleStr = getIntensityString(p.scale);
                const item = document.createElement('div');
                item.className = 'dp-station-item';
                item.innerHTML = `<span class="dp-station-name">${p.addr}</span><span class="dp-station-scale" style="background-color: ${scaleColor};">${scaleStr}</span>`;
                stationsListContainer.appendChild(item);
            });
        } else stationsListContainer.innerHTML = '<div style="padding: 10px; text-align: center; color: var(--text-secondary); font-size: 13px;">詳細な観測点データがありません</div>';

        map.setView([hypo.latitude, hypo.longitude], 7, { animate: true, duration: 0.5 });
        document.getElementById('dp-scale').innerText = getIntensityString(eq.earthquake.maxScale);
        document.getElementById('dp-scale').style.color = mainColor; document.getElementById('dp-box').style.borderColor = mainColor;
        
        const dpNameEl = document.getElementById('dp-name');
        dpNameEl.innerText = hypo.name || "震源地不明"; dpNameEl.title = hypo.name || "震源地不明"; 
        
        document.getElementById('dp-time').innerText = safeFormatDateString(eq.earthquake.time) + " 発生";
        document.getElementById('dp-mag').innerText = hypo.magnitude >= 0 ? hypo.magnitude.toFixed(1) : '-.-';
        document.getElementById('dp-depth').innerText = hypo.depth >= 0 ? hypo.depth : '--';

        document.getElementById('dp-extended-area').classList.add('collapsed');
        document.getElementById('dp-toggle-btn').innerHTML = '詳細情報を表示 ▼';
        document.getElementById('detail-panel').classList.add('show');
        document.getElementById('dp-extended-area').scrollTop = 0;
    }

    window.closeDetailPanel = function() {
        document.getElementById('detail-panel').classList.remove('show');
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        map.removeLayer(detailLayer);
        closeTsunamiPanel(); 
        
        const isHistoryTab = document.querySelectorAll('.tab-btn')[0].classList.contains('active');
        const isKyoshinTab = document.querySelectorAll('.tab-btn')[2].classList.contains('active');
        
        if (isHistoryTab) {
            map.addLayer(allEarthquakesLayer);
        } else {
            map.removeLayer(allEarthquakesLayer);
        }

        if (isKyoshinTab) {
            if(kyoshinLayer && !map.hasLayer(kyoshinLayer)) map.addLayer(kyoshinLayer);
        }
        
        map.setView([38.0, 137.0], 5, { animate: true });
    };

    window.closeTsunamiPanel = function() {
        document.getElementById('tsunami-panel').classList.remove('show');
        document.querySelectorAll('.t-list-item').forEach(el => el.classList.remove('active'));
        tsunamiLineLayer.clearLayers(); 
    };

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function () {
        legendDiv = L.DomUtil.create('div', 'legend');
        updateLegend('earthquake');
        return legendDiv;
    };
    legend.addTo(map);

    const style = document.createElement('style');
    style.innerHTML = `.custom-tooltip { background: rgba(0,0,0,0.8); border: 1px solid #555; color: #fff; font-size: 11px; backdrop-filter: blur(10px); }`;
    document.head.appendChild(style);

</script>
</body>
</html>
